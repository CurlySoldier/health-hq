name: Build and Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: src/frontend/web
        run: npm install && npm run theme:check && npm run build

      - name: Restore
        run: dotnet restore src/App.Host/App.Host.csproj

      - name: Build
        run: dotnet build src/App.Host/App.Host.csproj -c Release --no-restore


  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: |
          echo "IMAGE_NAME=$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "GARMIN_IMAGE_NAME=$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')-garmin-db" >> $GITHUB_ENV

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:main
            ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Build and push Garmin DB container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/garmin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GARMIN_IMAGE_NAME }}:main
            ghcr.io/${{ env.GARMIN_IMAGE_NAME }}:sha-${{ github.sha }}
